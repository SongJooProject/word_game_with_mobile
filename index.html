<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#2383e2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>📚 법률 용어 게임</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Lock Screen Overlay -->
    <div class="lock-overlay" id="lock-overlay">
        <div class="lock-box">
            <div class="lock-icon">🔒</div>
            <h2>법률 용어 게임</h2>
            <p>비밀번호를 입력하세요</p>
            <input type="password" id="lock-password" placeholder="비밀번호" autocomplete="off">
            <div class="lock-error" id="lock-error"></div>
            <button class="lock-submit" id="lock-submit">입장</button>
        </div>
    </div>

    <div class="app">
        <aside class="sidebar" id="sidebar">
            <h2>📚 과목</h2>
            <div class="subject-list" id="subject-list"></div>
        </aside>

        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <button class="menu-toggle" id="menu-toggle" aria-label="메뉴 열기">☰</button>

        <main class="main">
            <header class="header">
                <button class="home-btn" id="home-btn" style="display:none;" title="메뉴로 돌아가기">🏠</button>
                <h1 id="page-title">📖 형사소송법</h1>
                <div class="score-board">
                    <span>⭐ 점수: <strong id="score">0</strong></span>
                    <span>📝 문제: <strong id="question-num">0</strong> / <strong id="total">0</strong></span>
                </div>
            </header>

            <div class="progress-container" id="progress-container" style="display:none;">
                <div class="progress-bar" id="progress-bar"></div>
            </div>

            <div class="single-page-menu" id="single-page-menu">
                <div class="chapter-section" id="chapter-section"></div>
            </div>

            <div class="game-type-selector" id="game-type-selector" style="display:none;">
                <div class="type-buttons">
                    <button class="type-btn selected" data-type="type1">
                        <span class="type-icon">🔘</span>
                        <span class="type-label">선택형</span>
                    </button>
                    <button class="type-btn" data-type="type2">
                        <span class="type-icon">✏️</span>
                        <span class="type-label">빈칸형</span>
                    </button>
                    <button class="type-btn" data-type="all">
                        <span class="type-icon">🎯</span>
                        <span class="type-label">전체</span>
                    </button>
                </div>
                <div class="selected-info" id="selected-info"></div>
                <button class="btn-start" id="btn-start">🚀 게임 시작</button>
                <button class="btn-back-small" id="btn-back">← 메뉴로 돌아가기</button>
            </div>

            <div class="game-area" id="game-area" style="display:none;">
                <div class="question-card" id="question-card">
                    <div class="question-header">
                        <span class="question-num" id="question-num-display"></span>
                        <span class="question-type" id="question-type-display"></span>
                    </div>
                    <div class="sentence" id="sentence"></div>
                    <div class="hint" id="hint"></div>
                    <div class="inputs" id="inputs"></div>
                    <div class="buttons">
                        <button id="submit-btn" class="btn-primary">✅ 정답 확인</button>
                        <button id="next-btn" class="btn-secondary" style="display:none;">다음 문제 →</button>
                    </div>
                    <div class="message" id="message"></div>
                </div>
            </div>

            <div class="stats" id="stats" style="display:none;">
                <div class="stat-item">
                    <span>📊 정답률:</span>
                    <strong id="accuracy">0%</strong>
                </div>
                <div class="stat-item">
                    <span>⏱️ 소요 시간:</span>
                    <strong id="time">00:00</strong>
                </div>
            </div>
        </main>
    </div>

    <div class="result-modal" id="result-modal" style="display:none;">
        <div class="result-content">
            <h2>🎉 게임 종료!</h2>
            <div class="final-score">
                <span>🏆 최종 점수</span>
                <strong id="final-score">0</strong>
            </div>
            <div class="result-stats">
                <div class="stat">
                    <span>✅ 정답:</span>
                    <strong id="correct-count">0</strong>
                </div>
                <div class="stat">
                    <span>❌ 오답:</span>
                    <strong id="wrong-count">0</strong>
                </div>
                <div class="stat">
                    <span>📊 정답률:</span>
                    <strong id="final-accuracy">0%</strong>
                </div>
            </div>
            <button class="btn-restart" id="btn-restart">🔄 다시 하기</button>
        </div>
    </div>

    <script src="js/game.js"></script>
    <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js', { scope: '/' }).then(function(reg) {
        reg.update();
      });
      var refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
    }
    </script>
</body>
</html>
