<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>법률 용어 게임</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar">
            <h2>주제 선택</h2>
            <ul class="topic-list" id="topic-list">
                <li class="topic-item active" data-topic="civil">민법</li>
                <li class="topic-item" data-topic="admin">행정법</li>
                <li class="topic-item" data-topic="criminal">형법</li>
                <li class="topic-item" data-topic="criminal-procedure">형사소송법</li>
                <li class="topic-item" data-topic="commercial">상법</li>
                <li class="topic-item" data-topic="labor">노동법</li>
                <li class="topic-item" data-topic="constitution">헌법</li>
            </ul>
        </aside>

        <button class="menu-toggle" id="menu-toggle" aria-label="메뉴 열기">☰</button>

        <main class="main">
            <header class="header">
                <h1 id="topic-title">민법</h1>
                <div class="score-board">
                    <span>점수: <strong id="score">0</strong></span>
                    <span>문제: <strong id="question-num">0</strong> / <strong id="total">0</strong></span>
                </div>
            </header>

            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>

            <div class="game-type-selector" id="game-type-selector">
                <h3>문제 유형 선택</h3>
                <div class="type-buttons">
                    <button class="type-btn" onclick="selectGameType('ox')">
                        <span class="type-icon">O/X</span>
                        <span class="type-label">OX 문제</span>
                    </button>
                    <button class="type-btn" onclick="selectGameType('blank')">
                        <span class="type-icon">__</span>
                        <span class="type-label">빈칸 채우기</span>
                    </button>
                </div>
            </div>

            <div class="game-area" id="game-area" style="display:none;">
                <div class="question-card" id="question-card">
                    <div class="sentence" id="sentence"></div>
                    <div class="hint" id="hint"></div>
                    
                    <div class="ox-buttons" id="ox-buttons" style="display:none;">
                        <button class="ox-btn o-btn" onclick="checkOX(true)">O</button>
                        <button class="ox-btn x-btn" onclick="checkOX(false)">X</button>
                    </div>
                    
                    <div class="inputs" id="inputs"></div>
                    
                    <div class="buttons">
                        <button id="submit-btn" class="btn-primary" onclick="checkAnswer()">정답 확인</button>
                        <button id="next-btn" class="btn-secondary" onclick="nextQuestion()" style="display:none;">다음 문제</button>
                    </div>
                    
                    <div class="message" id="message"></div>
                </div>
            </div>

            <div class="controls" id="controls">
                <button class="btn-start" onclick="startGame()">게임 시작</button>
            </div>

            <div class="stats" id="stats" style="display:none;">
                <h3>통계</h3>
                <div class="stat-item">
                    <span>정답률:</span>
                    <strong id="accuracy">0%</strong>
                </div>
                <div class="stat-item">
                    <span>소요 시간:</span>
                    <strong id="time">00:00</strong>
                </div>
            </div>
        </main>
    </div>

    <div class="result-modal" id="result-modal" style="display:none;">
        <div class="result-content">
            <h2>게임 종료!</h2>
            <div class="final-score">
                <span>최종 점수</span>
                <strong id="final-score">0</strong>
            </div>
            <div class="result-stats">
                <div class="stat">
                    <span>정답:</span>
                    <strong id="correct-count">0</strong>
                </div>
                <div class="stat">
                    <span>오답:</span>
                    <strong id="wrong-count">0</strong>
                </div>
                <div class="stat">
                    <span>정답률:</span>
                    <strong id="final-accuracy">0%</strong>
                </div>
            </div>
            <button class="btn-restart" onclick="restartGame()">다시 하기</button>
        </div>
    </div>
