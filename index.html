<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>법률 용어 게임</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar">
            <h2>과목 선택</h2>
            <div class="subject-list" id="subject-list">
                <!-- 동적 생성 -->
            </div>
        </aside>

        <button class="menu-toggle" id="menu-toggle" aria-label="메뉴 열기">☰</button>

        <main class="main">
            <header class="header">
                <nav class="breadcrumb" id="breadcrumb">
                    <span class="crumb" id="crumb-subject"></span>
                    <span class="separator">›</span>
                    <span class="crumb" id="crumb-chapter"></span>
                    <span class="separator">›</span>
                    <span class="crumb active" id="crumb-section"></span>
                </nav>
                <div class="score-board">
                    <span>점수: <strong id="score">0</strong></span>
                    <span>문제: <strong id="question-num">0</strong> / <strong id="total">0</strong></span>
                </div>
            </header>

            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>

            <div class="menu-area" id="menu-area">
                <div class="menu-level" id="menu-level-chapter">
                    <h3>과목을 선택하세요</h3>
                    <div class="menu-items" id="chapter-list"></div>
                </div>
                <div class="menu-level" id="menu-level-section" style="display:none;">
                    <h3>세부 항목 선택</h3>
                    <div class="menu-items" id="section-list"></div>
                </div>
            </div>

            <div class="game-type-selector" id="game-type-selector" style="display:none;">
                <h3>문제 유형 선택</h3>
                <div class="type-buttons">
                    <button class="type-btn selected" onclick="selectGameType('type1')">
                        <span class="type-icon">①②③</span>
                        <span class="type-label">선택형</span>
                    </button>
                    <button class="type-btn" onclick="selectGameType('type2')">
                        <span class="type-icon">__</span>
                        <span class="type-label">빈칸형</span>
                    </button>
                    <button class="type-btn" onclick="selectGameType('all')">
                        <span class="type-icon">ALL</span>
                        <span class="type-label">전체</span>
                    </button>
                </div>
                <button class="btn-start" onclick="startGame()">게임 시작</button>
            </div>

            <div class="game-area" id="game-area" style="display:none;">
                <div class="question-card" id="question-card">
                    <div class="question-header">
                        <span class="question-num" id="question-num-display"></span>
                        <span class="question-type" id="question-type-display"></span>
                    </div>
                    <div class="sentence" id="sentence"></div>
                    <div class="hint" id="hint"></div>
                    
                    <div class="inputs" id="inputs"></div>
                    
                    <div class="buttons">
                        <button id="submit-btn" class="btn-primary" onclick="checkAnswer()">정답 확인</button>
                        <button id="next-btn" class="btn-secondary" onclick="nextQuestion()" style="display:none;">다음 문제</button>
                    </div>
                    
                    <div class="message" id="message"></div>
                </div>
            </div>

            <div class="controls" id="controls" style="display:none;">
                <button class="btn-back" onclick="goBack()">← 뒤로</button>
            </div>

            <div class="stats" id="stats" style="display:none;">
                <h3>통계</h3>
                <div class="stat-item">
                    <span>정답률:</span>
                    <strong id="accuracy">0%</strong>
                </div>
                <div class="stat-item">
                    <span>소요 시간:</span>
                    <strong id="time">00:00</strong>
                </div>
            </div>
        </main>
    </div>

    <div class="result-modal" id="result-modal" style="display:none;">
        <div class="result-content">
            <h2>게임 종료!</h2>
            <div class="final-score">
                <span>최종 점수</span>
                <strong id="final-score">0</strong>
            </div>
            <div class="result-stats">
                <div class="stat">
                    <span>정답:</span>
                    <strong id="correct-count">0</strong>
                </div>
                <div class="stat">
                    <span>오답:</span>
                    <strong id="wrong-count">0</strong>
                </div>
                <div class="stat">
                    <span>정답률:</span>
                    <strong id="final-accuracy">0%</strong>
                </div>
            </div>
            <button class="btn-restart" onclick="restartGame()">다시 하기</button>
        </div>
    </div>

    <script>
        let questionsData = null;
        
        async function loadQuestions() {
            try {
                const response = await fetch('data/questions.json');
                questionsData = await response.json();
            } catch (e) {
                console.error('문제 로딩 실패:', e);
                alert('문제 파일을 불러올 수 없습니다.');
            }
        }
    </script>
    <script src="js/game.js"></script>
</body>
</html>
